<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CD936" />
      <stop offset="100%" stop-color="#3A8A1C" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="10" dy="20" stdDeviation="15" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <g transform="rotate(25 250 250) translate(20, -50)" filter="url(#dropShadow)">
    <path d="M 250 450 C 200 350 50 300 100 200 C 120 220 150 250 180 230 C 130 150 150 80 220 120 C 240 140 260 160 270 140 C 270 50 350 50 380 120 C 400 140 420 160 440 140 C 480 80 520 150 480 220 C 450 240 420 220 400 250 C 450 300 480 380 400 380 C 370 360 340 340 320 370 C 300 420 260 480 250 450 Z" 
          fill="url(#leafGrad)" />
    <!-- Leaf veins -->
    <path d="M 250 450 Q 280 300 400 100" stroke="#9DF65C" stroke-width="8" fill="none" stroke-linecap="round" />
    <path d="M 320 280 Q 250 240 150 220" stroke="#9DF65C" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 330 220 Q 280 180 220 120" stroke="#9DF65C" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 350 200 Q 350 150 370 120" stroke="#9DF65C" stroke-width="6" fill="none" stroke-linecap="round" />
    <path d="M 370 250 Q 420 220 480 200" stroke="#9DF65C" stroke-width="6" fill="none" stroke-linecap="round" />
    <!-- Leaf holes -->
    <ellipse cx="200" cy="270" rx="15" ry="35" fill="#DCF4E9" transform="rotate(-30 200 270)" />
    <ellipse cx="260" cy="180" rx="12" ry="25" fill="#DCF4E9" transform="rotate(-15 260 180)" />
    <ellipse cx="320" cy="140" rx="10" ry="20" fill="#DCF4E9" />
    <ellipse cx="400" cy="180" rx="12" ry="30" fill="#DCF4E9" transform="rotate(30 400 180)" />
    <ellipse cx="440" cy="280" rx="15" ry="40" fill="#DCF4E9" transform="rotate(45 440 280)" />
  </g>
</svg>
